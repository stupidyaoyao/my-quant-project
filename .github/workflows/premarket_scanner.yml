name: Premarket Gappers Scanner

on:
  schedule:
    # UTC 12:00，大約對應美東時間 8:00am（夏令時間）/ 7:00am（冬令時間）
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Run premarket scanner
        run: python premarket_scanner.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add premarket_gappers.json
          git diff --cached --quiet || git commit -m "自動更新盤前爆量股掃描"
          git push
