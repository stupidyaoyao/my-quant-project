name: ORB Intraday Monitor

on:
  schedule:
    # 每5分鐘觸發一次，範圍涵蓋美股開盤時段（含夏令/冬令時間切換的緩衝）
    # UTC 13:30-21:00 大約對應美東時間 9:30-17:00（夏令時間）
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy yfinance

      - name: Run ORB monitor
        run: python orb_monitor.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add orb_log.csv orb_state.json
          git diff --cached --quiet || git commit -m "ORB盤中監控自動更新"
          git push
